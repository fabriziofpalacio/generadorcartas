<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de cartas · Colección 1/64</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --hw-black:#0d0d0d; --hw-black2:#1a1a1a; --hw-red:#e2231a; --hw-yellow:#ffd23f;
    --mb-red:#c8102e; --mb-yellow:#ffcf00;
    --gl-green:#0a5c36; --gl-lime:#8fd14f;
    --mj-purple:#5b2a86; --mj-pink:#e94f9c;
    --premium-gold:#d4af37; --premium-gold-light:#f5d67d; --premium-text:#2b2106;
    --tier2-a:#4caf6f; --tier2-b:#8ee6ab; --tier2-text:#0b2412;
    --tier3-a:#3b82f6; --tier3-b:#93c5fd; --tier3-text:#0b1f3f;
    --tier4-a:#8b5cf6; --tier4-b:#c4b5fd; --tier4-text:#221238;

    --surface-2:#ffffff; --surface-1:#f4f3f0; --surface-0:#eceae4;
    --text-primary:#1a1a1a; --text-secondary:#65635c; --text-muted:#9c998f;
    --border:#dedad2; --border-strong:#c7c2b7;
    --radius:8px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--surface-0); color:var(--text-primary); font-family:var(--font-sans); }
  .page { max-width:800px; margin:0 auto; padding:32px 20px 80px; }
  .page-header { text-align:center; margin-bottom:28px; }
  .page-header h1 { font-family:'Teko',sans-serif; font-size:48px; font-weight:600; margin:0; letter-spacing:.01em; text-transform:uppercase; }
  .page-header p { font-size:14px; color:var(--text-secondary); margin:4px 0 0; }

  input, select, button { font-family:var(--font-sans); font-size:14px; }
  input, select { height:36px; padding:0 10px; border:0.5px solid var(--border); border-radius:var(--radius); background:var(--surface-2); color:var(--text-primary); width:100%; }
  button { height:36px; padding:0 14px; border:0.5px solid var(--border-strong); border-radius:var(--radius); background:transparent; color:var(--text-primary); cursor:pointer; }
  button:hover { background:var(--surface-1); }
  button:active { transform:scale(0.98); }

  .layout { display:grid; grid-template-columns: 340px 1fr; gap:24px; align-items:start; }
  @media (max-width: 700px){ .layout{ grid-template-columns: 1fr; } }
  .panel { background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:1rem 1.25rem; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:4px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .imgdrop { border:1px dashed var(--border-strong); border-radius:var(--radius); padding:14px; text-align:center; cursor:pointer; font-size:13px; color:var(--text-secondary); }
  .imgdrop:hover { background:var(--surface-1); }
  .actions { display:flex; gap:8px; margin-top:14px; }
  .actions button { flex:1; }

  .previewwrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
  #downloadBtn { width:220px; }

  .card { width:300px; aspect-ratio:3/4; border-radius:18px; padding:10px; position:relative; overflow:hidden; }
  .card-inner { position:relative; width:100%; height:100%; border-radius:12px; background:#0d0d0d; overflow:hidden; display:flex; flex-direction:column; }
  .card-topbar { display:flex; justify-content:space-between; align-items:flex-start; padding:8px 10px 4px; }
  .card-brandline { color:#fff; }
  .card-brandline .eyebrow { font-family:'Rajdhani',sans-serif; font-size:10px; letter-spacing:.08em; opacity:.85; font-weight:600; text-transform:uppercase; }
  .card-brandline .model-line { font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600; margin-top:1px; }
  .card-logo { font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600; padding:2px 8px; border-radius:20px; background:rgba(255,255,255,.15); color:#fff; letter-spacing:.02em; }
  .card-photo { margin:4px 10px; border-radius:8px; background-color:#fff; background-size:cover; background-position:center; background-repeat:no-repeat; height:38%; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .card-photo .noimg { font-size:11px; color:#999; }
  .card-title { color:#fff; font-family:'Teko',sans-serif; font-size:44px; font-weight:600; padding:0 12px 6px; line-height:0.95; letter-spacing:.01em; text-transform:uppercase; }
  .card-fact { margin:0 10px 8px; background:rgba(255,255,255,.06); border-radius:8px; padding:8px 10px; flex:1; }
  .card-review { margin:0 10px 8px; background:rgba(255,255,255,.06); border-radius:8px; padding:6px 10px 8px; }
  .card-review #pv-review-text { font-family:'Rajdhani',sans-serif; color:#e0e0e0; font-size:12px; font-weight:500; font-style:italic; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-fact .ftitle { font-family:'Rajdhani',sans-serif; font-size:11px; letter-spacing:.08em; font-weight:600; margin-bottom:4px; text-transform:uppercase; }
  .card-fact ul { list-style:none; margin:0; padding:0; }
  .card-fact li { font-family:'Rajdhani',sans-serif; color:#e8e8e8; font-size:14px; font-weight:600; padding:1px 0; }
  .star-picker { display:flex; gap:4px; }
  .star-picker .star { font-size:24px; line-height:1; color:var(--border-strong); cursor:pointer; user-select:none; }
  .star-picker .star.active { color:#ffb400; }
  .card-stats { margin:0 10px; display:flex; flex-direction:column; gap:3px; }
  .card-stats .stat { font-family:'Rajdhani',sans-serif; border-radius:5px; padding:3px 8px; display:flex; justify-content:space-between; font-size:11px; font-weight:600; letter-spacing:.02em; }
  .card-footer { font-family:'Rajdhani',sans-serif; margin:8px 10px 10px; border-radius:20px; padding:4px 10px; font-size:11px; font-weight:600; letter-spacing:.04em; text-align:center; text-transform:uppercase; }

  .card.hw .eyebrow, .card.hw .ftitle { color: var(--hw-red); }
  .card.hw .card-title { color: var(--hw-yellow); text-shadow: 0 1px 2px rgba(0,0,0,.5); }
  .card.hw .card-logo { background: var(--hw-red); color:#fff; }
  .card.hw .card-inner { background: linear-gradient(180deg,var(--hw-black2),var(--hw-black)); border:2px solid var(--hw-red); }
  .card.hw .card-stats .stat { background:rgba(255,255,255,.06); color:#fff; border-left:2px solid var(--hw-red); }
  .card.hw .card-footer { background: var(--hw-red); color:#fff; }

  .card.mb .card-inner { background:#141414; border:2px solid var(--mb-red); }
  .card.mb .eyebrow, .card.mb .ftitle { color: var(--mb-yellow); }
  .card.mb .card-title { color:#fff; }
  .card.mb .card-logo { background: var(--mb-red); color:#fff; }
  .card.mb .card-stats .stat { background:rgba(200,16,46,.35); color:var(--mb-yellow); }
  .card.mb .card-footer { background: var(--mb-red); color:#fff; }

  .card.gl .card-inner { background:#0c1c13; border:2px solid var(--gl-lime); }
  .card.gl .eyebrow, .card.gl .ftitle { color: var(--gl-lime); }
  .card.gl .card-title { color:#fff; }
  .card.gl .card-logo { background: var(--gl-green); color:#fff; }
  .card.gl .card-stats .stat { background:rgba(10,92,54,.4); color:var(--gl-lime); }
  .card.gl .card-footer { background: var(--gl-green); color:#fff; }

  .card.mj .card-inner { background:#1a0f2b; border:2px solid var(--mj-pink); }
  .card.mj .eyebrow, .card.mj .ftitle { color: var(--mj-pink); }
  .card.mj .card-title { color:#fff; }
  .card.mj .card-logo { background: var(--mj-purple); color:#fff; }
  .card.mj .card-stats .stat { background:rgba(91,42,134,.4); color:#f0c9e6; }
  .card.mj .card-footer { background: var(--mj-purple); color:#fff; }

  .card.gen .card-inner { background: linear-gradient(180deg,#2b2d30,#131416); border:2px solid #9aa0a6; }
  .card.gen .eyebrow, .card.gen .ftitle { color: #c7ccd1; }
  .card.gen .card-title { color:#fff; }
  .card.gen .card-logo { background: #4a4e54; color:#fff; }
  .card.gen .card-stats .stat { background:rgba(255,255,255,.06); color:#fff; border-left:2px solid #9aa0a6; }
  .card.gen .card-footer { background: #4a4e54; color:#fff; }

  .card.premium .card-inner { border-color: var(--premium-gold); box-shadow: 0 0 18px rgba(212,175,55,.55), inset 0 0 24px rgba(212,175,55,.08); }
  .card.premium .card-logo { background: linear-gradient(135deg, var(--premium-gold), var(--premium-gold-light)); color: var(--premium-text); }
  .card.premium .card-footer { background: linear-gradient(135deg, var(--premium-gold), var(--premium-gold-light)); color: var(--premium-text); }

  .card.tier2 .card-inner { border-color: var(--tier2-a); box-shadow: 0 0 10px rgba(76,175,111,.4); }
  .card.tier2 .card-logo { background: linear-gradient(135deg, var(--tier2-a), var(--tier2-b)); color: var(--tier2-text); }
  .card.tier2 .card-footer { background: linear-gradient(135deg, var(--tier2-a), var(--tier2-b)); color: var(--tier2-text); }

  .card.tier3 .card-inner { border-color: var(--tier3-a); box-shadow: 0 0 13px rgba(59,130,246,.45); }
  .card.tier3 .card-logo { background: linear-gradient(135deg, var(--tier3-a), var(--tier3-b)); color: var(--tier3-text); }
  .card.tier3 .card-footer { background: linear-gradient(135deg, var(--tier3-a), var(--tier3-b)); color: var(--tier3-text); }

  .card.tier4 .card-inner { border-color: var(--tier4-a); box-shadow: 0 0 15px rgba(139,92,246,.5); }
  .card.tier4 .card-logo { background: linear-gradient(135deg, var(--tier4-a), var(--tier4-b)); color: var(--tier4-text); }
  .card.tier4 .card-footer { background: linear-gradient(135deg, var(--tier4-a), var(--tier4-b)); color: var(--tier4-text); }

  .status { font-size:12px; color:var(--text-muted); text-align:center; margin-top:8px; min-height:16px; }
</style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <h1>Generador de cartas</h1>
    <p>Crea la ficha de tu modelo y descárgala como imagen</p>
  </div>

  <div class="layout">

    <div class="panel">
      <div class="field">
        <label>Marca</label>
        <select id="brand">
          <option value="Massdi (Masdi)">Massdi (Masdi)</option>
          <option value="JKM (Jiangsu Kuai Mei)">JKM (Jiangsu Kuai Mei)</option>
          <option value="Time Micro (TM)">Time Micro (TM)</option>
          <option value="CM Model">CM Model</option>
          <option value="Xcartoys">Xcartoys</option>
          <option value="MINI GT">MINI GT</option>
          <option value="Kaido House">Kaido House</option>
          <option value="Inno64 (Inno Models)">Inno64 (Inno Models)</option>
          <option value="Tarmac Works">Tarmac Works</option>
          <option value="Pop Race">Pop Race</option>
          <option value="Tomica Limited Vintage (TLV / TLVN)">Tomica Limited Vintage (TLV / TLVN)</option>
          <option value="Micro Turbo">Micro Turbo</option>
          <option value="Hobby Japan">Hobby Japan</option>
          <option value="Para64">Para64</option>
          <option value="Era Car">Era Car</option>
          <option value="Schuco">Schuco</option>
          <option value="Kyosho">Kyosho</option>
          <option value="BM Creations">BM Creations</option>
          <option value="PGM (Private Goods Model)">PGM (Private Goods Model)</option>
          <option value="Ignition Model">Ignition Model</option>
          <option value="YM Model">YM Model</option>
          <option value="Error 404">Error 404</option>
          <option value="One Model">One Model</option>
          <option value="MotorHelix">MotorHelix</option>
          <option value="Greenlight Collectibles" data-theme="gl">Greenlight Collectibles</option>
          <option value="Auto World">Auto World</option>
          <option value="M2 Machines">M2 Machines</option>
          <option value="Johnny Lightning">Johnny Lightning</option>
          <option value="Racing Champions">Racing Champions</option>
          <option value="Jada Toys">Jada Toys</option>
          <option value="Hot Wheels" data-theme="hw" selected>Hot Wheels</option>
          <option value="Matchbox" data-theme="mb">Matchbox</option>
          <option value="Majorette" data-theme="mj">Majorette</option>
          <option value="Tomica">Tomica</option>
          <option value="Siku">Siku</option>
          <option value="Welly">Welly</option>
          <option value="Maisto">Maisto</option>
          <option value="Bburago">Bburago</option>
          <option value="Kinsmart">Kinsmart</option>
          <option value="Corgi">Corgi</option>
          <option value="First Gear">First Gear</option>
          <option value="DCP (Diecast Promotions)">DCP (Diecast Promotions)</option>
          <option value="Tiny">Tiny</option>
          <option value="GCD (GainCorp Products)">GCD (GainCorp Products)</option>
        </select>
      </div>

      <div class="field">
        <label>Foto del modelo</label>
        <div class="imgdrop" id="imgDrop"><i class="ti ti-photo-plus" style="font-size:20px"></i><div id="imgDropLabel">Subir imagen</div></div>
        <input type="file" id="imgInput" accept="image/*" style="display:none">
      </div>

      <div class="field">
        <label>Nombre del modelo</label>
        <input id="model" placeholder="'16 Mazda CX-5">
        <label style="margin-top:10px; display:block;">Reseña (opcional)</label>
        <textarea id="reseña" rows="4" placeholder="Escribe o pega aquí una breve reseña del vehículo..." style="width:100%; padding:8px 10px; border:0.5px solid var(--border); border-radius:var(--radius); background:var(--surface-2); color:var(--text-primary); font-family:var(--font-sans); resize:vertical;"></textarea>      </div>

      <div class="row2">
        <div class="field"><label>Color</label><input id="color" placeholder="Gris"></div>
        <div class="field"><label>Año</label><input id="year" placeholder="2016"></div>
      </div>
      <div class="field"><label>Serie</label><input id="series" placeholder="MBX Road Trip"></div>

      <div class="field">
        <label>Rareza (qué tan difícil fue conseguirlo)</label>
        <div class="star-picker" id="starPicker" data-value="3">
          <span class="star" data-v="1">★</span>
          <span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span>
          <span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
        </div>
      </div>

      <div class="row2">
        <div class="field"><label>Velocidad top (km/h)</label><input id="topspeed" placeholder="190"></div>
        <div class="field"><label>Motor</label><input id="engine" placeholder="2.5L"></div>
      </div>
      <div class="actions">
        <button id="clearBtn"><i class="ti ti-refresh"></i> Limpiar</button>
      </div>
    </div>

    <div class="previewwrap">
      <div class="card hw" id="previewCard">
        <div class="card-inner">
          <div class="card-topbar">
            <div class="card-brandline">
              <div class="eyebrow">FICHA DE COLECCIÓN</div>
              <div class="model-line" id="pv-series-top">Serie</div>
            </div>
            <div class="card-logo" id="pv-brandtag">Hot Wheels</div>
          </div>
          <div class="card-photo" id="pv-photo"><span class="noimg">Sin imagen</span></div>
          <div class="card-title" id="pv-model">Nombre del modelo</div>
          <div class="card-fact">
            <div class="ftitle">FICHA TÉCNICA</div>
            <ul>
              <li>Color: <span id="pv-color">-</span></li>
              <li>Año: <span id="pv-year">-</span></li>
              <li>Serie: <span id="pv-series">-</span></li>
                <li>Rareza: <span id="pv-rarity">★★★☆☆</span></li>
            </ul>
          </div>
          <div class="card-stats">
            <div class="stat"><span>VELOCIDAD TOP (KM/H)</span><span id="pv-topspeed">-</span></div>
            <div class="stat"><span>MOTOR</span><span id="pv-engine">-</span></div>
          </div>
          <div class="card-review" id="pv-review-block" style="display:none;">
            <div class="ftitle">RESEÑA</div>
            <div id="pv-review-text"></div>
          </div>
          <div class="card-footer">MI COLECCIÓN</div>
        </div>
      </div>
      <button id="downloadBtn"><i class="ti ti-download"></i> Descargar imagen</button>
      <div class="status" id="status"></div>
    </div>

  </div>
</div>

<script>
(function(){
  let currentImage = null;
  const el = id => document.getElementById(id);

  function starsString(n){
    n = Math.max(0, Math.min(5, parseInt(n)||0));
    return '★★★★★'.slice(0,n) + '☆☆☆☆☆'.slice(0,5-n);
  }

  const starPicker = el('starPicker');
  function setStars(v){
    starPicker.dataset.value = v;
    starPicker.querySelectorAll('.star').forEach(s=>{
      s.classList.toggle('active', parseInt(s.dataset.v) <= v);
    });
    updatePreview();
  }
  starPicker.querySelectorAll('.star').forEach(s=>{
    s.addEventListener('click', ()=> setStars(parseInt(s.dataset.v)));
  });
  setStars(3);

  function updatePreview(){
    const select = el('brand');
    const opt = select.options[select.selectedIndex];
    const brandName = opt.value;
    const theme = opt.dataset.theme || 'gen';
    const card = el('previewCard');
    const rarity = parseInt(starPicker.dataset.value) || 0;
    const tierClass = rarity === 5 ? ' premium' : (rarity >= 2 ? ' tier'+rarity : '');
    card.className = 'card ' + theme + tierClass;
    el('pv-brandtag').textContent = brandName;
    el('pv-model').textContent = el('model').value || 'Nombre del modelo';
    el('pv-color').textContent = el('color').value || '-';
    el('pv-year').textContent = el('year').value || '-';
    el('pv-series').textContent = el('series').value || '-';
    el('pv-series-top').textContent = el('series').value || 'Serie';
    el('pv-rarity').textContent = starsString(starPicker.dataset.value);
    el('pv-topspeed').textContent = el('topspeed').value || '-';
    el('pv-engine').textContent = el('engine').value || '-';
    const reseñaVal = el('reseña').value.trim();
    el('pv-review-block').style.display = reseñaVal ? 'block' : 'none';
    el('pv-review-text').textContent = reseñaVal;
    const photo = el('pv-photo');
    if(currentImage){
      photo.style.backgroundImage = 'url(' + currentImage + ')';
      photo.innerHTML = '';
    } else {
      photo.style.backgroundImage = 'none';
      photo.innerHTML = '<span class="noimg">Sin imagen</span>';
    }
  }

  ['brand','model','color','year','series','topspeed','engine','reseña'].forEach(id=>{
    el(id).addEventListener('input', updatePreview);
    el(id).addEventListener('change', updatePreview);
  });

  el('imgDrop').addEventListener('click', ()=> el('imgInput').click());
  el('imgInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      const img = new Image();
      img.onload = function(){
        const maxW = 1600;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        currentImage = canvas.toDataURL('image/jpeg', 0.95);
        el('imgDropLabel').textContent = 'Imagen cargada · cambiar';
        updatePreview();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });


  el('clearBtn').addEventListener('click', ()=>{
    currentImage = null;
    ['model','color','year','series','topspeed','engine'].forEach(id=> el(id).value='');
    el('imgDropLabel').textContent = 'Subir imagen';
    el('status').textContent = '';
    el('reseña').value = '';
    setStars(3);
    updatePreview();
  });

  function slugify(s){
    return (s||'carta').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'carta';
  }

  const THEMES = {
    hw:  { bgTop:'#1a1a1a', bgBottom:'#0d0d0d', border:'#e2231a', eyebrow:'#e2231a', title:'#ffd23f', titleShadow:true,  logoBg:'#e2231a', logoText:'#ffffff', statBg:'rgba(255,255,255,0.06)', statBorderLeft:'#e2231a', statText:'#ffffff', footerBg:'#e2231a', footerText:'#ffffff' },
    mb:  { bgTop:'#141414', bgBottom:'#141414', border:'#c8102e', eyebrow:'#ffcf00', title:'#ffffff', titleShadow:false, logoBg:'#c8102e', logoText:'#ffffff', statBg:'rgba(200,16,46,0.35)', statBorderLeft:null,      statText:'#ffcf00', footerBg:'#c8102e', footerText:'#ffffff' },
    gl:  { bgTop:'#0c1c13', bgBottom:'#0c1c13', border:'#8fd14f', eyebrow:'#8fd14f', title:'#ffffff', titleShadow:false, logoBg:'#0a5c36', logoText:'#ffffff', statBg:'rgba(10,92,54,0.4)',   statBorderLeft:null,      statText:'#8fd14f', footerBg:'#0a5c36', footerText:'#ffffff' },
    mj:  { bgTop:'#1a0f2b', bgBottom:'#1a0f2b', border:'#e94f9c', eyebrow:'#e94f9c', title:'#ffffff', titleShadow:false, logoBg:'#5b2a86', logoText:'#ffffff', statBg:'rgba(91,42,134,0.4)',  statBorderLeft:null,      statText:'#f0c9e6', footerBg:'#5b2a86', footerText:'#ffffff' },
    gen: { bgTop:'#2b2d30', bgBottom:'#131416', border:'#9aa0a6', eyebrow:'#c7ccd1', title:'#ffffff', titleShadow:false, logoBg:'#4a4e54', logoText:'#ffffff', statBg:'rgba(255,255,255,0.06)', statBorderLeft:'#9aa0a6', statText:'#ffffff', footerBg:'#4a4e54', footerText:'#ffffff' }
  };

  function roundRectPath(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  async function renderCard(){
    const SCALE = 4;
    const W = 300, H = 400;
    const canvas = document.createElement('canvas');
    canvas.width = W*SCALE; canvas.height = H*SCALE;
    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    try {
      await Promise.all([
        document.fonts.load("600 44px 'Teko'"),
        document.fonts.load("700 12px 'Rajdhani'"),
        document.fonts.load("600 12px 'Rajdhani'")
      ]);
      await document.fonts.ready;
    } catch(e){}

    const select = el('brand');
    const opt = select.options[select.selectedIndex];
    const brandName = opt.value;
    const t = THEMES[opt.dataset.theme || 'gen'];

    const model = el('model').value || 'Nombre del modelo';
    const color = el('color').value;
    const year = el('year').value;
    const series = el('series').value;
    const topspeed = el('topspeed').value;
    const engine = el('engine').value;
    const reseñaVal = (el('reseña').value || '').trim();
    const hasReview = reseñaVal.length > 0;

    const innerX=10, innerY=10, innerW=280, innerH=380, radius=12;
    const contentX = innerX+10, contentW = innerW-20;
    const rarity = parseInt(el('starPicker').dataset.value) || 0;
    const TIER_STYLES = {
      2: { c1:'#4caf6f', c2:'#8ee6ab', text:'#0b2412', glow:'rgba(76,175,111,0.4)',  blur:8  },
      3: { c1:'#3b82f6', c2:'#93c5fd', text:'#0b1f3f', glow:'rgba(59,130,246,0.45)', blur:10 },
      4: { c1:'#8b5cf6', c2:'#c4b5fd', text:'#221238', glow:'rgba(139,92,246,0.5)', blur:11 },
      5: { c1:'#d4af37', c2:'#f5d67d', text:'#2b2106', glow:'rgba(212,175,55,0.6)', blur:12 }
    };
    const tierStyle = TIER_STYLES[rarity] || null;

    // card background + border
    roundRectPath(ctx, innerX, innerY, innerW, innerH, radius);
    const grad = ctx.createLinearGradient(0, innerY, 0, innerY+innerH);
    grad.addColorStop(0, t.bgTop); grad.addColorStop(1, t.bgBottom);
    ctx.fillStyle = grad; ctx.fill();
    ctx.lineWidth = 2;
    if(tierStyle){
      const goldBorder = ctx.createLinearGradient(innerX, innerY, innerX+innerW, innerY+innerH);
      goldBorder.addColorStop(0, tierStyle.c1); goldBorder.addColorStop(1, tierStyle.c2);
      ctx.strokeStyle = goldBorder;
      ctx.shadowColor = tierStyle.glow; ctx.shadowBlur = tierStyle.blur;
    } else {
      ctx.strokeStyle = t.border;
    }
    ctx.stroke();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

    ctx.save();
    roundRectPath(ctx, innerX, innerY, innerW, innerH, radius);
    ctx.clip();

    // topbar
    ctx.textBaseline = 'top'; ctx.textAlign = 'left';
    ctx.fillStyle = t.eyebrow;
    ctx.font = "600 9px 'Rajdhani', sans-serif";
    ctx.fillText('FICHA DE COLECCIÓN', contentX, innerY+8);

    ctx.fillStyle = '#ffffff';
    ctx.font = "600 11px 'Rajdhani', sans-serif";
    ctx.fillText(series || 'Serie', contentX, innerY+20);

    ctx.font = "600 11px 'Rajdhani', sans-serif";
    const pillPadX = 8, pillH = 18;
    const pillW = ctx.measureText(brandName).width + pillPadX*2;
    const pillX = innerX+innerW-10-pillW, pillY = innerY+6;
    roundRectPath(ctx, pillX, pillY, pillW, pillH, pillH/2);
    if(tierStyle){
      const goldPill = ctx.createLinearGradient(pillX, pillY, pillX+pillW, pillY+pillH);
      goldPill.addColorStop(0, tierStyle.c1); goldPill.addColorStop(1, tierStyle.c2);
      ctx.fillStyle = goldPill; ctx.fill();
      ctx.fillStyle = tierStyle.text;
    } else {
      ctx.fillStyle = t.logoBg; ctx.fill();
      ctx.fillStyle = t.logoText;
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(brandName, pillX+pillW/2, pillY+pillH/2+1);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';

    // photo box (always the same size — never shrinks, regardless of review text)
    const photoY = 54, photoH = 108;
    roundRectPath(ctx, contentX, photoY, contentW, photoH, 8);
    ctx.fillStyle = '#ffffff'; ctx.fill();
    if(currentImage){
      try {
        const img = await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=currentImage; });
        ctx.save();
        roundRectPath(ctx, contentX, photoY, contentW, photoH, 8);
        ctx.clip();
        const s = Math.max(contentW/img.naturalWidth, photoH/img.naturalHeight);
        const dw = img.naturalWidth*s, dh = img.naturalHeight*s;
        ctx.drawImage(img, contentX+(contentW-dw)/2, photoY+(photoH-dh)/2, dw, dh);
        ctx.restore();
      } catch(e){}
    } else {
      ctx.fillStyle = '#999999';
      ctx.font = "11px 'Rajdhani', sans-serif";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Sin imagen', contentX+contentW/2, photoY+photoH/2);
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    }

    // title (auto-shrink to fit width)
    const titleY = photoY+photoH+8;
    const modelText = model.toUpperCase();
    let titleSize = 44;
    ctx.font = `600 ${titleSize}px 'Teko', sans-serif`;
    while(ctx.measureText(modelText).width > contentW && titleSize > 22){
      titleSize -= 2;
      ctx.font = `600 ${titleSize}px 'Teko', sans-serif`;
    }
    if(t.titleShadow){ ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=3; ctx.shadowOffsetY=1; }
    ctx.fillStyle = t.title;
    ctx.fillText(modelText, contentX, titleY);
    ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

    // fact box — text compresses (smaller line spacing) to make room for the review box below, if present
    const factY = titleY + 44 + 2;
    const factH = hasReview ? 56 : 91;
    roundRectPath(ctx, contentX, factY, contentW, factH, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();

    ctx.fillStyle = t.eyebrow;
    ctx.font = "700 10px 'Rajdhani', sans-serif";
    ctx.fillText('FICHA TÉCNICA', contentX+10, factY+7);

    const lineStep = hasReview ? 10 : 16;
    const lineFont = hasReview ? "600 10px 'Rajdhani', sans-serif" : "600 13px 'Rajdhani', sans-serif";
    ctx.fillStyle = '#e8e8e8';
    ctx.font = lineFont;
    ctx.fillText('Color: '+(color||'-'), contentX+10, factY+7+lineStep);
    ctx.fillText('Año: '+(year||'-'), contentX+10, factY+7+lineStep*2);
    ctx.fillText('Serie: '+(series||'-'), contentX+10, factY+7+lineStep*3);
    ctx.fillStyle = '#ffb400';
    ctx.fillText('Rareza: '+starsString(el('starPicker').dataset.value), contentX+10, factY+7+lineStep*4);

    // review box — only if present; single truncated line so it always fits without touching the photo
    let afterFactY = factY + factH + 2;
    if(hasReview){
      const reviewY = afterFactY, reviewH = 33;
      roundRectPath(ctx, contentX, reviewY, contentW, reviewH, 8);
      ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();
      ctx.fillStyle = t.eyebrow;
      ctx.font = "700 9px 'Rajdhani', sans-serif";
      ctx.fillText('RESEÑA', contentX+10, reviewY+6);

      ctx.font = "italic 500 10px 'Rajdhani', sans-serif";
      ctx.fillStyle = '#e0e0e0';
      const maxLineW = contentW - 20;
      let line = reseñaVal;
      if(ctx.measureText(line).width > maxLineW){
        while(line.length > 0 && ctx.measureText(line+'…').width > maxLineW){ line = line.slice(0,-1); }
        line += '…';
      }
      ctx.fillText(line, contentX+10, reviewY+6+14);

      afterFactY = reviewY + reviewH + 2;
    }


    // stats
    const statsY = afterFactY, rowH = 22, rowGap = 3;
    function drawStat(y, label, value){
      roundRectPath(ctx, contentX, y, contentW, rowH, 5);
      ctx.fillStyle = t.statBg; ctx.fill();
      if(t.statBorderLeft){
        ctx.fillStyle = t.statBorderLeft;
        ctx.fillRect(contentX, y, 2, rowH);
      }
      ctx.font = "600 11px 'Rajdhani', sans-serif";
      ctx.fillStyle = t.statText;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText(label, contentX+8, y+rowH/2+1);
      ctx.textAlign = 'right';
      ctx.fillText(value||'-', contentX+contentW-8, y+rowH/2+1);
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    }
    drawStat(statsY, 'VELOCIDAD TOP (KM/H)', topspeed);
    drawStat(statsY+rowH+rowGap, 'MOTOR', engine);

    // footer
    const footerY = statsY+rowH*2+rowGap+6, footerH = 22;
    roundRectPath(ctx, contentX, footerY, contentW, footerH, footerH/2);
    if(tierStyle){
      const goldFooter = ctx.createLinearGradient(contentX, footerY, contentX+contentW, footerY+footerH);
      goldFooter.addColorStop(0, tierStyle.c1); goldFooter.addColorStop(1, tierStyle.c2);
      ctx.fillStyle = goldFooter; ctx.fill();
      ctx.fillStyle = tierStyle.text;
    } else {
      ctx.fillStyle = t.footerBg; ctx.fill();
      ctx.fillStyle = t.footerText;
    }
    ctx.font = "700 11px 'Rajdhani', sans-serif";
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('MI COLECCIÓN', contentX+contentW/2, footerY+footerH/2+1);
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';

    ctx.restore();
    return canvas;
  }

  el('downloadBtn').addEventListener('click', async ()=>{
    el('status').textContent = 'Generando imagen...';
    try {
      const canvas = await renderCard();
      const link = document.createElement('a');
      link.download = slugify(el('model').value) + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      el('status').textContent = 'Imagen descargada.';
    } catch(err){
      el('status').textContent = 'Error al generar la imagen: ' + err.message;
    }
  });

  updatePreview();
})();
</script>
